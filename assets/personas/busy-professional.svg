    <path d="M44 57 Q51 53 58 57" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M62 57 Q69 53 76 57" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
