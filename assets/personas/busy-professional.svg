    <path d="M57 77 Q60 80 63 77" stroke="#0004" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Mouth -->
    <path d="M52 83 Q60 89 68 83" stroke="#c0705a" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Beard overlay -->
    

    <!-- Glasses overlay -->
    

    <!-- Shoulders / body -->
